<!DOCTYPE html>
<html>
<head>
<title>Organization Register</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#2c3e50,#4ca1af);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
padding:20px;
}

/* CARD */

.card{
background:white;
padding:40px;
width:380px;
max-width:100%;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#333;
}

/* INPUTS */

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
box-sizing:border-box;
}

/* BUTTON */

button{
width:100%;
padding:12px;
background:#3498db;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#2f86c1;
}

/* LOCATION BUTTON */

.loc-btn{
background:#27ae60;
margin-bottom:12px;
}

.loc-btn:hover{
background:#1f8f4c;
}

/* SMALL TEXT */

.footer{
margin-top:18px;
font-size:13px;
color:#777;
}

/* MOBILE */

@media (max-width:480px){

.card{
padding:30px 20px;
}

h2{
font-size:22px;
}

button{
font-size:16px;
}

}

</style>

</head>

<body>

<div class="card">

<h2>Organization Register</h2>

<form method="post">

{% csrf_token %}

<input name="name" placeholder="Organization Name" required>

<input name="email" type="email" placeholder="Email" required>

<input name="password" type="password" placeholder="Password" required>

<button type="button" class="loc-btn" onclick="getLocation()">Get Office Location</button>

<input id="latitude" name="latitude" placeholder="Office Latitude" required>

<input id="longitude" name="longitude" placeholder="Office Longitude" required>

<input name="radius" placeholder="Allowed Radius (meters)" required>

<button type="submit">Register</button>

</form>

<div class="footer">
Geo Attendance System
</div>

</div>

<script>

function getLocation(){

navigator.geolocation.getCurrentPosition(function(position){

document.getElementById("latitude").value = position.coords.latitude;
document.getElementById("longitude").value = position.coords.longitude;

alert("Location captured successfully");

}, function(){

alert("Location permission required");

}, {
enableHighAccuracy:true
})

}

</script>

</body>

</html>
