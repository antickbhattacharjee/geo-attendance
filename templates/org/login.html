<!DOCTYPE html>
<html>
<head>
<title>Organization Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#2c3e50,#4ca1af);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
padding:20px;
}

/* LOGIN CARD */

.card{
background:white;
padding:40px;
width:360px;
max-width:100%;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:25px;
color:#333;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
font-size:15px;
box-sizing:border-box;
}

.password-box{
position:relative;
}

.toggle{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
font-size:13px;
color:#555;
}

button{
width:100%;
padding:12px;
background:#27ae60;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#219150;
}

.error{
color:red;
margin-top:10px;
font-size:14px;
}

.footer{
margin-top:20px;
font-size:13px;
color:#777;
}

/* MOBILE */

@media (max-width:480px){

.card{
padding:30px 20px;
}

h2{
font-size:22px;
}

button{
font-size:17px;
}

}

</style>

</head>

<body>

<div class="card">

<h2>Organization Login</h2>

<form method="post">
{% csrf_token %}

<input name="email" type="email" placeholder="Email" required>

<div class="password-box">
<input id="password" name="password" type="password" placeholder="Password" required>
<span class="toggle" onclick="togglePassword()">Show</span>
</div>

<button type="submit">Login</button>

</form>

<div class="error">
{{ error }}
</div>

<div class="footer">
Geo Attendance System
</div>

</div>

<script>

function togglePassword(){

let pass = document.getElementById("password")

if(pass.type === "password"){
pass.type = "text"
}else{
pass.type = "password"
}

}

</script>

</body>
</html>
